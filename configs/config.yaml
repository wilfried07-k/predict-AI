project:
  name: predict-AI-poultry
  domain: poultry

data:
  path: data/synthetic_poultry_farm.csv

model:
  target_cols:
    - final_weight_kg
    - mortality_rate_pct
    - avg_daily_gain_g
    - feed_intake_kg
    - fcr
    - annual_revenue_usd
  feature_cols:
    - age_days
    - chick_weight_g
    - temp_c
    - humidity_pct
    - stocking_density
    - vaccine_score
    - breed_index
    - housing_quality
    - feed_protein_pct
    - water_quality
    - management_index
    - flock_size
    - feed_price_usd_kg
    - sale_price_usd_kg
    - energy_cost_usd
  test_size: 0.2
  random_state: 42
  cv_folds: 5
